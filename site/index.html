<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Search in Coding - AI Coding Agent 生态追踪器</title>
  <meta name="description" content="持续自动更新的 AI Coding Agent 生态追踪索引库，追踪 10 个主流 AI 编码工具的插件、MCP、Skills、Rules、Context Engineering 资源。">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="Search in Coding - AI Coding Agent 生态追踪器">
  <meta property="og:description" content="持续自动更新的 AI Coding Agent 生态追踪索引库">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://coding.lzpgood.online/">
  <meta name="theme-color" content="#1c1917">
  <link rel="stylesheet" href="styles.fa874e.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Search in Coding",
    "description": "AI Coding Agent ecosystem tracker",
    "url": "https://coding.lzpgood.online/"
  }
  </script>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>Search in Coding</h1>
        <p data-i18n="subtitle">AI Coding Agent 生态追踪器</p>
      </div>
      <div class="lang-switch" aria-label="Language switcher">
        <button id="langZh" type="button" aria-pressed="true">中文</button>
        <button id="langEn" type="button" aria-pressed="false">English</button>
      </div>
    </div>
    <!-- Report pills: open centered modal via app.js (not detailOverlay) -->
    <nav>
      <a href="#" data-report="curated-top.md" data-i18n="navTop">推荐榜</a>
      <a href="#" data-report="weekly-report.md" data-i18n="navWeekly">生态周报</a>
      <a href="#" data-report="tool-comparison.md" data-i18n="navCompare">工具对比</a>
      <button id="exportFav" class="fav-btn" data-i18n="exportFav">导出收藏</button>
      <input id="favExportUrl" type="text" class="fav-export-input" readonly style="display:none;" placeholder="收藏链接">
    </nav>
    <div id="metrics" class="hero-stats" aria-label="Statistics"></div>
    <!-- Charts under metrics; keep #toolChart / #scoreChart for existing render.js -->
    <section class="charts-row" id="chartsSection" aria-label="Overview charts">
      <article class="chart-card">
        <div class="chart-card-head">
          <h3 class="chart-card-title" data-i18n="toolChartTitle">工具覆盖分布</h3>
          <p class="chart-card-sub" data-i18n="toolChartSub">各目标工具关联项目数 · 单位：项目</p>
        </div>
        <div id="toolChart" class="chart-container chart-body" role="img" aria-label="Tool coverage chart"></div>
      </article>
      <article class="chart-card">
        <div class="chart-card-head">
          <h3 class="chart-card-title" data-i18n="scoreChartTitle">分数分布</h3>
          <p class="chart-card-sub" data-i18n="scoreChartSub">项目 total_score 分桶 · 单位：项目数</p>
        </div>
        <div id="scoreChart" class="chart-container chart-body" role="img" aria-label="Score distribution chart"></div>
      </article>
    </section>
  </header>

  <main>
    <!-- Zone 1: Discovery -->
    <section id="discoverySection">
      <h2 data-i18n="discoveryTitle">最新发现</h2>
      <p class="hint" data-i18n="discoveryHint">按发现时间排序的高质量项目 Top 12</p>
      <div id="discovery" class="discovery-grid"></div>
    </section>

    <!-- Zone 2: Tool Overview (grid only; charts live under metrics) -->
    <section id="toolOverviewSection">
      <h2 data-i18n="toolOverviewTitle">工具生态概览</h2>
      <p class="hint" data-i18n="toolOverviewHint">点击工具卡片查看该工具的生态资源</p>
      <div id="toolOverview" class="tool-grid"></div>
    </section>

    <!-- Zone 3: Search -->
    <section id="searchZone">
      <h2 data-i18n="searchTitle">生态项目搜索</h2>
      <p class="hint" data-i18n="searchHint">多选标签筛选，支持 OR/AND 切换</p>

      <div class="toolbar">
        <div class="controls">
          <input id="q" data-i18n-placeholder="searchPlaceholder" placeholder="搜索项目名称或描述..." aria-label="Search">

          <div id="toolTags" class="tag-group" role="group" aria-label="Tool filter"></div>
          <div id="typeTags" class="tag-group" role="group" aria-label="Type filter"></div>

          <div id="modeToggle" class="mode-toggle" role="radiogroup" aria-label="Match mode">
            <button class="active" role="radio" aria-checked="true" data-i18n="modeOR">任一匹配</button>
            <button role="radio" aria-checked="false" data-i18n="modeAND">全部匹配</button>
          </div>

          <select id="sort" aria-label="Sort">
            <option value="score" data-i18n="sortScore">分数</option>
            <option value="stars" data-i18n="sortStars">Stars</option>
            <option value="updated" data-i18n="sortUpdated">最近更新</option>
            <option value="match" data-i18n="sortMatch">标签匹配</option>
            <option value="recent" data-i18n="sortRecent">最近发现</option>
            <option value="name" data-i18n="sortName">名称</option>
          </select>

          <label><input id="curatedOnly" type="checkbox"> <span data-i18n="curatedOnly">只看推荐</span></label>
          <label><input id="recentOnly" type="checkbox"> <span data-i18n="recentOnly">只看最近新增</span></label>
          <label><input id="favoritesOnly" type="checkbox"> <span data-i18n="favoritesOnly">只看收藏</span></label>
        </div>
      </div>

      <div id="activeFilters" class="active-filters"></div>

      <div class="result-count">
        <span id="resultCount"></span>
        <button id="clearFilters" class="clear-filters" data-i18n="clearFilters" style="display:none;">清空筛选</button>
      </div>

      <div class="table-wrapper">
        <table role="table">
          <thead>
            <tr>
              <th class="sortable" data-sort="name" data-i18n="thName">名称</th>
              <th data-i18n="thType">类型</th>
              <th data-i18n="thTools">工具</th>
              <th class="sortable" data-sort="score" data-i18n="thScore">分数</th>
              <th class="sortable" data-sort="stars" data-i18n="thStars">Stars</th>
              <th data-i18n="thLink">链接</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div id="pagination" class="pagination"></div>
    </section>
  </main>

  <footer>
    <span data-i18n="footerUpdated">数据更新于</span>: <span id="lastUpdated"></span> ·
    <a href="https://github.com/lzpgood123/search-in-coding" target="_blank" rel="noopener">GitHub</a> ·
    <span data-i18n="footerDesc">AI Coding Agent 生态追踪器</span>
  </footer>

  <aside id="detailOverlay" class="detail-overlay" role="dialog" aria-modal="true" aria-label="Project details"></aside>

  <div id="reportBackdrop" class="modal-backdrop" hidden></div>
  <div id="reportModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="reportModalTitle" hidden>
    <div class="modal-head">
      <div>
        <h2 id="reportModalTitle">推荐榜</h2>
        <p class="meta" data-i18n="reportMeta">报告</p>
      </div>
      <button type="button" class="modal-close" data-action="close-report" aria-label="Close report">×</button>
    </div>
    <div class="modal-tabs" role="tablist" aria-label="Report tabs">
      <button type="button" role="tab" data-report="curated-top.md" data-i18n="navTop">推荐榜</button>
      <button type="button" role="tab" data-report="weekly-report.md" data-i18n="navWeekly">生态周报</button>
      <button type="button" role="tab" data-report="tool-comparison.md" data-i18n="navCompare">工具对比</button>
    </div>
    <div id="reportModalBody" class="modal-body report-content"></div>
  </div>

  <!-- Scripts: load order matters; source names unhashed — build_site.py rewrites hashes -->
  <script src="js/i18n.260a7a.js"></script>
  <script src="js/data.08cf6f.js"></script>
  <script src="js/filters.04c884.js"></script>
  <script src="js/charts.e856fc.js"></script>
  <script src="js/render.b2e4ce.js"></script>
  <script src="js/app.55789d.js"></script>
</body>
</html>
