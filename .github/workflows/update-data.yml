name: Update Data
on:
  workflow_dispatch:
    inputs:
      github_limit:
        description: GitHub search results per query
        default: '20'
      exa_limit:
        description: Exa results per query
        default: '3'
  schedule:
    - cron: '0 2 * * *'
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: python3 -m pip install pytest
      - name: Update tracker data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/update_tracker.py \
            --github-limit "${{ inputs.github_limit || '20' }}" \
            --exa-limit "${{ inputs.exa_limit || '3' }}"
          python3 -m pytest -q
      - name: Commit changes
        run: |
          if git diff --quiet data/ docs/; then
            echo "No tracker data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python3 scripts/bump_version.py

          git add data docs site VERSION CHANGELOG.md
          git commit -m "chore(release): bump to $(cat VERSION) (auto data update)"
          git push
