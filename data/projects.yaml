  readme_preview: '# CodexClaw


    飞书/微信 私聊机器人 → 本机 OpenCode / Codex / Claude / Qoder CLI，运行时可切换后端。


    ## 概述


    CodexClaw 是一个单实例 IM → CLI 桥接服务：接收飞书或微信私聊消息，调用本机已安装的 AI CLI 后端（`opencode`、`codex`、`claude`、`qodercli`）处理后回传。核心设计是
    **运行时多后端路由**——通过聊天命令即可切换后端，切换状态持久化，重启保留。默认后端为 `opencode`。


    ### 功能特性


    **渠道接入**

    - 飞书 Webhook 回调（URL challenge 校验 + 签名校验）

    - 微信私聊（轻量 sidecar 长轮询 iLink Bot API）

    - 私聊文本 + 图片消息（自动下载图片并交给 CLI）

    - 群聊 @ 机器人触发（默认要求 @）


    **多后端路由**

    - `opencode` / `codex` / `claude` / `qodercli` 四后端，运行时通过 `/opencode` `/codex`
    `/clau'
