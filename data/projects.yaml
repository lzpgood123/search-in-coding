  readme_preview: '# pr-review-agent


    `pr-review-agent` 是一个面向 GitHub Pull Request 场景的 AI 代码评审 CLI 工具。

    DEMO视频链接：https://www.bilibili.com/video/BV1mVVS69Ey3/?vd_source=9b29cfa39ca88cce2efef0648d2f3591


    用户输入 GitHub PR URL 后，系统会自动获取 PR 元数据、PR 描述、变更文件、diff hunk、风险信号和相关上下文，并生成中文 Markdown
    报告。当前 MVP 聚焦命令行使用方式，不包含前端、数据库、Webhook 服务或 GitHub App 自动监听。


    ## 核心能力


