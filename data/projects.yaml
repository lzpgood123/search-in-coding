  readme_preview: '# AI PR Review Assistant


    AI PR Review Assistant 是一个面向 GitHub Pull Request 的 AI 代码评审 CLI 工具。用户输入 PR URL
    后，工具会自动获取 PR 元数据、变更文件、diff、相关上下文，并调用兼容 OpenAI Chat Completions 协议的大模型生成评审报告。


    本项目的目标是辅助人工 Reviewer 更快理解 PR、发现高风险变更、生成 Review 建议，而不是替代人工合并判断。


    ## 演示视频


