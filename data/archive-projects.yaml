    ## 功能特点


    - 🔗 **标准 MCP 协议**：完全兼容 Operit 和 Trae Solo

    - 🚀 **任务派发**：将编码任务委派给 Trae Solo 执行

    - 📊 **状态追踪**：实时查询任务执行状态

